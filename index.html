<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RM Tools | Midwifery Clinical Calculator</title>
    <style>
      :root {
        --bg: #1e1e2e;
        --surface: #2a2a3e;
        --accent: #f59e0b;
        --accent-hover: #d97706;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --flag: #fb923c;
        --border: #3a3a5c;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.5;
      }

      header {
        background-color: var(--surface);
        border-bottom: 2px solid var(--accent);
        padding: 16px 20px;
      }

      header h1 {
        color: var(--accent);
        font-size: 1.5rem;
        letter-spacing: 0.05em;
      }

      main {
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
      }

      h2 {
        color: var(--text-primary);
        font-size: 1.1rem;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }

      /* =====================
   SELECTOR CONTAINER
   Dating method dropdown
   ===================== */

      .selector-container {
        margin-bottom: 24px;
      }

      select {
        width: 100%;
        background-color: var(--surface);
        color: var(--text-primary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
        font-size: 1rem;
        cursor: pointer;
        transition: border-color 0.2s ease;
        color-scheme: dark;
        /* Remove default browser styling */
        -webkit-appearance: none;
        appearance: none;
      }

      select:focus {
        outline: none;
        border-color: var(--accent);
      }

      /* =====================
   CALCULATOR CARDS
   Each dating method gets its own card
   ===================== */

      .calculator-card {
        /* Card sits above the background */
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }

      .calculator-card h3 {
        color: var(--accent);
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* =====================
       LABELS
       ===================== */

      label {
        /* Block makes label sit on its own line above the input */
        display: block;
        color: var(--text-secondary);
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 6px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      /* =====================
       INPUTS
       Fisher-price philosophy - big, clear, obvious
       ===================== */

      input[type="date"],
      input[type="number"] {
        /* Full width of the card */
        width: 100%;
        background-color: var(--bg);
        color: var(--text-primary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
        font-size: 1rem;
        margin-bottom: 16px;
        /* Smooth border colour change on focus */
        transition: border-color 0.2s ease;
        /* Remove default browser styling */
        -webkit-appearance: none;
        appearance: none;
        color-scheme: dark;
      }

      /* Glows amber when you tap into it */
      input[type="date"]:focus,
      input[type="number"]:focus {
        /* Remove default browser focus ring */
        outline: none;
        border-color: var(--accent);
      }

      /* =====================
       BUTTONS
       Big, responsive, satisfying to tap
       ===================== */

      button {
        width: 100%;
        background-color: var(--accent);
        color: #1a1a2e;
        border: none;
        border-radius: 8px;
        padding: 16px;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        cursor: pointer;
        /* Smooth transitions for all state changes */
        transition:
          background-color 0.15s ease,
          transform 0.1s ease;
      }

      /* Slightly darker when hovered on desktop */
      button:hover {
        background-color: var(--accent-hover);
      }

      /* Physically presses down when tapped - the Fisher-price moment */
      button:active {
        background-color: var(--accent-hover);
        transform: scale(0.98);
      }

      /* =====================
       RESULTS CONTAINER
       Hidden until JavaScript writes to it
       ===================== */

      .result {
        margin-top: 16px;
        padding: 16px;
        background-color: var(--bg);
        border-radius: 8px;
        border-left: 3px solid var(--accent);
      }

      .result p {
        color: var(--text-primary);
        font-size: 1rem;
        margin-bottom: 6px;
      }

      .result .edd {
        color: var(--accent);
        font-size: 1.3rem;
        font-weight: 700;
      }

      .result .ga {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      /* Warning flag for discrepancies */
      .flag {
        margin-top: 10px;
        padding: 10px 12px;
        background-color: rgba(251, 146, 60, 0.15);
        border-left: 3px solid var(--flag);
        border-radius: 4px;
        color: var(--flag);
        font-size: 0.85rem;
      }

      /* =====================
   GESTATIONAL AGE ROW
   Weeks and days inputs sit side by side
   ===================== */

      .ga-input-row {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }

      .ga-input-group {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .ga-input-group input {
        margin-bottom: 4px;
      }

      /* Match ga-label style to our regular labels */
      .ga-label {
        display: block;
        color: var(--text-secondary);
        font-size: 0.85rem;
        font-weight: 500;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>RM Tools</h1>
    </header>

    <main>
      <!-- =====================
         DUE DATE CALCULATOR
         Province selector and dating method selector
         live here, cards show/hide based on selection
         ===================== -->

      <h2>Due Date Calculator</h2>

      <!-- Dating method selector -->
      <!-- This dropdown controls which input card is visible -->
      <div class="selector-container">
        <label for="dating-method">Dating Method</label>
        <select id="dating-method" onchange="showDateCard()">
          <option value="">Select a method...</option>
          <option value="lmp">From LMP</option>
          <option value="ultrasound">From Ultrasound</option>
          <option value="art">From ART Transfer</option>
        </select>
      </div>

      <!-- LMP Card -->
      <!-- Hidden by default, shown when LMP is selected -->
      <section class="calculator-card" id="card-lmp" style="display: none">
        <h3>From LMP</h3>

        <!-- Formula: LMP + 280 days = EDD -->
        <label for="lmp-date">Last Menstrual Period</label>
        <input type="date" id="lmp-date" />

        <button onclick="calculateLMP()">Calculate</button>

        <!-- Empty container - JavaScript will write results here -->
        <div id="lmp-result"></div>
      </section>

      <!-- Ultrasound Card -->
      <!-- Hidden by default, shown when Ultrasound is selected -->
      <section
        class="calculator-card"
        id="card-ultrasound"
        style="display: none"
      >
        <h3>From Ultrasound</h3>

        <!-- We need two inputs - the date of the scan and the GA at the time -->
        <label for="us-date">Ultrasound Date</label>
        <input type="date" id="us-date" />

        <label for="us-weeks">Gestational Age at Scan</label>

        <!-- Side by side inputs for weeks and days -->
        <div class="ga-input-row">
          <div class="ga-input-group">
            <input
              type="number"
              id="us-weeks"
              min="0"
              max="42"
              placeholder="Weeks"
            />
            <span class="ga-label">weeks</span>
          </div>
          <div class="ga-input-group">
            <input
              type="number"
              id="us-days"
              min="0"
              max="6"
              placeholder="Days"
            />
            <span class="ga-label">days</span>
          </div>
        </div>

        <button onclick="calculateUS()">Calculate</button>

        <!-- Empty container - JavaScript will write results here -->
        <div id="us-result"></div>
      </section>

      <!-- ART Card -->
      <!-- Hidden by default, shown when ART is selected -->
      <section class="calculator-card" id="card-art" style="display: none">
        <h3>From ART Transfer</h3>

        <label for="art-date">Transfer Date</label>
        <input type="date" id="art-date" />

        <!-- Day 3 vs Day 5 selector -->
        <!-- This changes the formula: Day 5 + 261 days, Day 3 + 263 days -->
        <label for="art-type">Embryo Type</label>
        <select id="art-type">
          <option value="5">Day 5 embryo</option>
          <option value="3">Day 3 embryo</option>
        </select>

        <button onclick="calculateART()">Calculate</button>

        <!-- Empty container - JavaScript will write results here -->
        <div id="art-result"></div>
      </section>
    </main>

    <script>
      // =====================
      // HELPER FUNCTIONS
      // Small reusable tools that the main functions will use
      // =====================

      // Calculates gestational age in weeks and days between two dates
      // Returns an object with weeks and days as separate numbers
      function getGestationalAge(lmpDate, today) {
        // Total difference in milliseconds, converted to days
        const totalDays = Math.floor((today - lmpDate) / (1000 * 60 * 60 * 24));
        const weeks = Math.floor(totalDays / 7);
        const days = totalDays % 7;
        return { weeks, days };
      }

      // Formats a date object into a readable string like "January 1, 2025"
      function formatDate(date) {
        return date.toLocaleDateString("en-CA", {
          year: "numeric",
          month: "long",
          day: "numeric"
        });
      }

      // =====================
      // SHOW/HIDE CARDS
      // Reveals the correct input card based on dropdown selection
      // Hides all other cards first, then shows the selected one
      // =====================

      function showDateCard() {
        // Get the selected value from the dropdown
        const method = document.getElementById("dating-method").value;

        // Hide all cards first
        // We always reset before showing, so only one card is ever visible
        document.getElementById("card-lmp").style.display = "none";
        document.getElementById("card-ultrasound").style.display = "none";
        document.getElementById("card-art").style.display = "none";

        // Show the selected card
        if (method === "lmp") {
          document.getElementById("card-lmp").style.display = "block";
        } else if (method === "ultrasound") {
          document.getElementById("card-ultrasound").style.display = "block";
        } else if (method === "art") {
          document.getElementById("card-art").style.display = "block";
        }
      }

      // =====================
      // LMP CALCULATION
      // Formula: LMP + 280 days = EDD
      // =====================

      function calculateLMP() {
        // Grab the value from the input field using its id
        const input = document.getElementById("lmp-date").value;

        // Check if the user actually entered a date
        if (!input) {
          document.getElementById("lmp-result").innerHTML = `
            <div class="flag">⚠ Please enter an LMP date.</div>
        `;
          return;
        }

        // Parse the input into a JavaScript date object
        // We add T12:00:00 to avoid timezone issues that can shift the date by one day
        const lmp = new Date(input + "T12:00:00");

        // Calculate EDD by adding 280 days in milliseconds
        const edd = new Date(lmp.getTime() + 280 * 24 * 60 * 60 * 1000);

        // Calculate gestational age as of today
        const today = new Date();
        const ga = getGestationalAge(lmp, today);

        // Write the result into the result container
        document.getElementById("lmp-result").innerHTML = `
        <div class="result">
            <p>Estimated Due Date</p>
            <p class="edd">${formatDate(edd)}</p>
            <p class="ga">GA today: ${ga.weeks}w${ga.days}d</p>
        </div>
    `;
      }

      // =====================
      // ULTRASOUND CALCULATION
      // Formula: scan date + (280 - GA in days at scan) = EDD
      // =====================

      function calculateUS() {
        // Grab all three inputs
        const usDateInput = document.getElementById("us-date").value;
        const weeksInput = document.getElementById("us-weeks").value;
        const daysInput = document.getElementById("us-days").value;

        // Check that all fields are filled
        if (!usDateInput || weeksInput === "" || daysInput === "") {
          document.getElementById("us-result").innerHTML = `
            <div class="flag">⚠ Please enter the ultrasound date and gestational age.</div>
        `;
          return;
        }

        // Parse the scan date
        const scanDate = new Date(usDateInput + "T12:00:00");

        // Convert GA at scan to total days - exactly your mental math
        const gaAtScanDays = parseInt(weeksInput) * 7 + parseInt(daysInput);

        // Days remaining until EDD from scan date
        const daysRemaining = 280 - gaAtScanDays;

        // Calculate EDD - scan date + remaining days
        const edd = new Date(
          scanDate.getTime() + daysRemaining * 24 * 60 * 60 * 1000
        );

        // Calculate GA today
        // We need the "corrected LMP" - work backwards from scan date
        const correctedLMP = new Date(
          scanDate.getTime() - gaAtScanDays * 24 * 60 * 60 * 1000
        );
        const today = new Date();
        const ga = getGestationalAge(correctedLMP, today);

        // Write results
        document.getElementById("us-result").innerHTML = `
        <div class="result">
            <p>Estimated Due Date</p>
            <p class="edd">${formatDate(edd)}</p>
            <p class="ga">GA today: ${ga.weeks}w${ga.days}d</p>
        </div>
    `;
      }

      // =====================
      // ART Calculation
      // Formula: transfer date + (266 - embryo age in days) = EDD
      // =====================

      function calculateART() {
        // Grab the Embryo Age Input
        const embryoAgeInput = document.getElementById("art-type").value;
        const transferDateInput = document.getElementById("art-date").value;

        // Check that all fields are filled
        if (!transferDateInput) {
          document.getElementById("art-result").innerHTML = `
            <div class="flag">⚠ Please select the embryo age and date of transfer.</div>
        `;
          return;
        }

        // Parse the Transfer Date
        const transferDate = new Date(transferDateInput + "T12:00:00");

        // Set the Embryo Type based on the selection of the user
        let daysToAdd;
        if (embryoAgeInput === "5") {
          daysToAdd = 261;
        } else {
          daysToAdd = 263;
        }

        // Calculate the EDD based on scanDate plus days to add

        const edd = new Date(
          transferDate.getTime() + daysToAdd * 24 * 60 * 60 * 1000
        );

        // calculate the current gestation

        const correctedLMP = new Date(
          edd.getTime() - 280 * 24 * 60 * 60 * 1000
        );
        const today = new Date();
        const ga = getGestationalAge(correctedLMP, today);

        // Write results
        document.getElementById("art-result").innerHTML = `
        <div class="result">
            <p>Estimated Due Date</p>
            <p class="edd">${formatDate(edd)}</p>
            <p class="ga">GA today: ${ga.weeks}w${ga.days}d</p>
        </div>
    `;
      }
    </script>
  </body>
</html>
