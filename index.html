<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RM Tools | Midwifery Clinical Calculator</title>
    <style>
      :root {
        --bg: #1e1e2e;
        --surface: #2a2a3e;
        --accent: #f59e0b;
        --accent-hover: #d97706;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --flag: #fb923c;
        --border: #3a3a5c;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: var(--bg);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.5;
      }

      header {
        background-color: var(--surface);
        border-bottom: 2px solid var(--accent);
        padding: 16px 20px;
      }

      header h1 {
        color: var(--accent);
        font-size: 1.5rem;
        letter-spacing: 0.05em;
      }

      main {
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
      }

      h2 {
        color: var(--text-primary);
        font-size: 1.1rem;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }

      /* =====================
   CALCULATOR CARDS
   Each dating method gets its own card
   ===================== */

      .calculator-card {
        /* Card sits above the background */
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
      }

      .calculator-card h3 {
        color: var(--accent);
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 16px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* =====================
       LABELS
       ===================== */

      label {
        /* Block makes label sit on its own line above the input */
        display: block;
        color: var(--text-secondary);
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 6px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      /* =====================
       INPUTS
       Fisher-price philosophy - big, clear, obvious
       ===================== */

      input[type="date"],
      input[type="number"] {
        /* Full width of the card */
        width: 100%;
        background-color: var(--bg);
        color: var(--text-primary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px 16px;
        font-size: 1rem;
        margin-bottom: 16px;
        /* Smooth border colour change on focus */
        transition: border-color 0.2s ease;
        /* Remove default browser styling */
        -webkit-appearance: none;
        appearance: none;
        color-scheme: dark;
      }

      /* Glows amber when you tap into it */
      input[type="date"]:focus,
      input[type="number"]:focus {
        /* Remove default browser focus ring */
        outline: none;
        border-color: var(--accent);
      }

      /* =====================
       BUTTONS
       Big, responsive, satisfying to tap
       ===================== */

      button {
        width: 100%;
        background-color: var(--accent);
        color: #1a1a2e;
        border: none;
        border-radius: 8px;
        padding: 16px;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        cursor: pointer;
        /* Smooth transitions for all state changes */
        transition:
          background-color 0.15s ease,
          transform 0.1s ease;
      }

      /* Slightly darker when hovered on desktop */
      button:hover {
        background-color: var(--accent-hover);
      }

      /* Physically presses down when tapped - the Fisher-price moment */
      button:active {
        background-color: var(--accent-hover);
        transform: scale(0.98);
      }

      /* =====================
       RESULTS CONTAINER
       Hidden until JavaScript writes to it
       ===================== */

      .result {
        margin-top: 16px;
        padding: 16px;
        background-color: var(--bg);
        border-radius: 8px;
        border-left: 3px solid var(--accent);
      }

      .result p {
        color: var(--text-primary);
        font-size: 1rem;
        margin-bottom: 6px;
      }

      .result .edd {
        color: var(--accent);
        font-size: 1.3rem;
        font-weight: 700;
      }

      .result .ga {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      /* Warning flag for discrepancies */
      .flag {
        margin-top: 10px;
        padding: 10px 12px;
        background-color: rgba(251, 146, 60, 0.15);
        border-left: 3px solid var(--flag);
        border-radius: 4px;
        color: var(--flag);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>RM Tools</h1>
    </header>

    <main>
      <h2>Due Date Calculator</h2>

      <!-- =====================
     DUE DATE CALCULATOR
     Calculates EDD from LMP, Ultrasound, or ART transfer date
     All calculations happen locally - no data leaves the device
     ===================== -->

      <section class="calculator-card">
        <!-- Section for LMP-based dating -->
        <!-- Formula: LMP + 280 days = EDD -->
        <h3>From LMP</h3>

        <!-- Label is linked to input via matching "for" and "id" attributes -->
        <!-- This improves accessibility - tapping the label focuses the input -->
        <label for="lmp-date">Last Menstrual Period</label>

        <!-- type="date" gives us a native date picker on mobile -->
        <input type="date" id="lmp-date" />

        <!-- onclick tells the button what JavaScript function to run -->
        <button onclick="calculateLMP()">Calculate</button>

        <!-- Empty container - JavaScript will write results here -->
        <div id="lmp-result"></div>
      </section>
    </main>

    <script>
      // =====================
      // HELPER FUNCTIONS
      // Small reusable tools that the main functions will use
      // =====================

      // Calculates gestational age in weeks and days between two dates
      // Returns an object with weeks and days as separate numbers
      function getGestationalAge(lmpDate, today) {
        // Total difference in milliseconds, converted to days
        const totalDays = Math.floor((today - lmpDate) / (1000 * 60 * 60 * 24));
        const weeks = Math.floor(totalDays / 7);
        const days = totalDays % 7;
        return { weeks, days };
      }

      // Formats a date object into a readable string like "January 1, 2025"
      function formatDate(date) {
        return date.toLocaleDateString("en-CA", {
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }

      // =====================
      // LMP CALCULATION
      // Formula: LMP + 280 days = EDD
      // =====================

      function calculateLMP() {
        // Grab the value from the input field using its id
        const input = document.getElementById("lmp-date").value;

        // Check if the user actually entered a date
        if (!input) {
          document.getElementById("lmp-result").innerHTML = `
            <div class="flag">⚠ Please enter an LMP date.</div>
        `;
          return;
        }

        // Parse the input into a JavaScript date object
        // We add T12:00:00 to avoid timezone issues that can shift the date by one day
        const lmp = new Date(input + "T12:00:00");

        // Calculate EDD by adding 280 days in milliseconds
        const edd = new Date(lmp.getTime() + 280 * 24 * 60 * 60 * 1000);

        // Calculate gestational age as of today
        const today = new Date();
        const ga = getGestationalAge(lmp, today);

        // Write the result into the result container
        document.getElementById("lmp-result").innerHTML = `
        <div class="result">
            <p>Estimated Due Date</p>
            <p class="edd">${formatDate(edd)}</p>
            <p class="ga">GA today: ${ga.weeks}w${ga.days}d</p>
        </div>
    `;
      }
    </script>
  </body>
</html>
