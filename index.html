<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RM Tools | Midwifery Clinical Calculator</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RM Tools" />
  </head>
  <body>
    <header>
      <div class="header-left">
        <!-- Home icon and title both navigate to home screen -->
        <span class="home-icon" onclick="navigateTo('home')">⌂</span>
        <h1 onclick="navigateTo('home')">RM Tools</h1>
      </div>
      <div class="header-controls">
        <select id="province-selector" onchange="saveProvince()">
          <option value="">Province</option>
          <option value="BC">BC</option>
          <option value="AB">AB</option>
          <option value="ON">ON</option>
        </select>
        <button class="clear-btn" id="clear-btn" onclick="clearAll()" style="display: none">Clear</button>
      </div>
    </header>

    <main>
      <!-- =====================
     HOME SCREEN
     Landing page with tool buttons
     ===================== -->
      <section id="screen-home">
        <div class="home-welcome">
          <p class="home-subtitle">Clinical tools for registered midwives</p>
        </div>

        <div class="home-buttons">
          <button class="home-tool-btn" onclick="navigateTo('edd')">
            <span class="tool-icon">📅</span>
            <div class="tool-info">
              <span class="tool-name">EDD Calculator</span>
              <span class="tool-desc">Calculate estimated due date</span>
            </div>
          </button>

          <button class="home-tool-btn" onclick="navigateTo('planner')">
            <span class="tool-icon">🗓️</span>
            <div class="tool-info">
              <span class="tool-name">Care Planner</span>
              <span class="tool-desc">Prenatal care timeline by province</span>
            </div>
          </button>

          <button class="home-tool-btn" onclick="navigateTo('newborn')">
            <span class="tool-icon">👶</span>
            <div class="tool-info">
              <span class="tool-name">Newborn Tools</span>
              <span class="tool-desc">Neonatal clinical calculators and tools</span>
            </div>
          </button>

          <button class="home-tool-btn coming-soon">
            <span class="tool-icon">💊</span>
            <div class="tool-info">
              <span class="tool-name">ASA Decision Tree</span>
              <span class="tool-desc">Coming soon</span>
            </div>
          </button>
        </div>
      </section>

      <!-- =====================
     NEWBORN TOOLS
     ===================== -->
      <section id="screen-newborn" style="display: none">
        <!-- Newborn Tools Menu -->
        <div id="newborn-menu">
          <div class="home-buttons">
            <button class="home-tool-btn" onclick="navigateTo('age-in-hours')">
              <span class="tool-icon">⏱️</span>
              <div class="tool-info">
                <span class="tool-name">Age in Hours</span>
                <span class="tool-desc">For plotting bilirubin on the nomogram</span>
              </div>
            </button>

            <button class="home-tool-btn coming-soon">
              <span class="tool-icon">⚖️</span>
              <div class="tool-info">
                <span class="tool-name">Weight & Percentiles</span>
                <span class="tool-desc">Coming soon</span>
              </div>
            </button>

            <button class="home-tool-btn" onclick="openHyperbili()">
              <span class="tool-icon">🔬</span>
              <div class="tool-info">
                <span class="tool-name">Bilirubin Nomogram</span>
                <span class="tool-desc">Opens hyperbili.com</span>
              </div>
            </button>
          </div>
        </div>

        <!-- Age in Hours Calculator -->
        <div id="tool-age-in-hours" style="display: none">
          <button class="back-btn" onclick="navigateTo('newborn')">← Newborn Tools</button>
          <div class="calculator-card">
            <div class="card-header-row">
              <h3>Age in Hours</h3>
              <button class="clear-card-btn" onclick="clearAgeCalculator()">Clear</button>
            </div>
            <p class="tool-intro">For plotting bilirubin on the nomogram</p>

            <label for="dob-date">Date of Birth</label>
            <input type="date" id="dob-date" />

            <label for="dob-time">Time of Birth (24hr)</label>
            <input type="time" id="dob-time" />

            <button onclick="calculateAgeInHours()">Calculate</button>

            <div id="age-result"></div>
          </div>
        </div>
      </section>

      <!-- =====================
         DUE DATE CALCULATOR
         Province selector and dating method selector
         live here, cards show/hide based on selection
         ===================== -->

      <div id="calculator-section">
        <h2>Due Date Calculator</h2>

        <!-- =====================
     DATING METHOD SELECTOR
     Segmented control - one tap to switch between methods
     Active button glows amber, inactive buttons are outlined
     ===================== -->
        <div class="selector-container">
          <label>Dating Method</label>
          <div class="segmented-control">
            <button class="segment-btn" id="btn-lmp" onclick="showDateCard('lmp')">LMP</button>
            <button class="segment-btn" id="btn-us" onclick="showDateCard('us')">US</button>
            <button class="segment-btn" id="btn-art" onclick="showDateCard('art')">ART</button>
          </div>
        </div>

        <!-- LMP Card -->
        <!-- Hidden by default, shown when LMP is selected -->
        <section class="calculator-card" id="card-lmp" style="display: none">
          <h3>From LMP</h3>

          <!-- Formula: LMP + 280 days = EDD -->
          <label for="lmp-date">Last Menstrual Period</label>
          <input type="date" id="lmp-date" />

          <button onclick="calculateLMP()">Calculate</button>

          <!-- Empty container - JavaScript will write results here -->
          <div id="lmp-result"></div>
        </section>

        <!-- Ultrasound Card -->
        <!-- Hidden by default, shown when Ultrasound is selected -->
        <section class="calculator-card" id="card-ultrasound" style="display: none">
          <h3>From Ultrasound</h3>

          <!-- We need two inputs - the date of the scan and the GA at the time -->
          <label for="us-date">Ultrasound Date</label>
          <input type="date" id="us-date" />

          <label for="us-weeks">Gestational Age at Scan</label>

          <!-- Side by side inputs for weeks and days -->
          <div class="ga-input-row">
            <div class="ga-input-group">
              <input type="number" id="us-weeks" min="0" max="42" placeholder="Weeks" />
              <span class="ga-label">weeks</span>
            </div>
            <div class="ga-input-group">
              <input type="number" id="us-days" min="0" max="6" placeholder="Days" />
              <span class="ga-label">days</span>
            </div>
          </div>

          <button onclick="calculateUS()">Calculate</button>

          <!-- Empty container - JavaScript will write results here -->
          <div id="us-result"></div>
        </section>

        <!-- ART Card -->
        <!-- Hidden by default, shown when ART is selected -->
        <section class="calculator-card" id="card-art" style="display: none">
          <h3>From ART Transfer</h3>

          <label for="art-date">Transfer Date</label>
          <input type="date" id="art-date" />

          <!-- Day 3 vs Day 5 selector -->
          <!-- This changes the formula: Day 5 + 261 days, Day 3 + 263 days -->
          <label for="art-type">Embryo Type</label>
          <select id="art-type">
            <option value="5">Day 5 embryo</option>
            <option value="3">Day 3 embryo</option>
          </select>

          <button onclick="calculateART()">Calculate</button>

          <!-- Empty container - JavaScript will write results here -->
          <div id="art-result"></div>
        </section>

        <!-- =====================
     CALCULATED DATES
     Persistent results section - always visible
     Accumulates EDDs as each method is calculated
     Discrepancy flags appear here when relevant
     ===================== -->
        <section class="results-section" id="results-section" style="display: none">
          <h3>Calculated Dates</h3>
          <div id="results-lmp"></div>
          <div id="results-us"></div>
          <div id="results-art"></div>
          <div id="discrepancy-flag"></div>
        </section>
      </div>

      <!-- =====================
     CARE TIMELINE
     Populated when user selects an EDD
     Can also be used with manual EDD entry
     ===================== -->
      <section class="calculator-card" id="care-timeline" style="display: none">
        <h3>Care Timeline</h3>

        <!-- Selected or manually entered EDD -->
        <div class="timeline-edd-row">
          <div>
            <label id="working-edd-label" style="display: none">Working EDD</label>
            <p id="timeline-edd-display" class="edd"></p>
            <p id="timeline-edd-source" class="ga"></p>
            <p id="timeline-ga-display" class="ga"></p>
          </div>
          <button class="use-edd-btn" onclick="openCalculator()">Edit</button>
        </div>

        <!-- Manual EDD entry -->
        <div id="manual-edd-section">
          <label for="manual-edd">Enter EDD directly</label>
          <input type="date" id="manual-edd" onchange="useManualEDD()" />
        </div>

        <!-- NIPS toggle -->
        <div class="toggle-row">
          <label for="nips-checkbox">Include NIPS?</label>
          <input type="checkbox" id="nips-checkbox" onchange="toggleNIPS()" />
        </div>

        <!-- Generated schedule -->
        <div id="schedule-output"></div>
        <!-- Share/Copy buttons -->
        <!-- Only visible once a schedule has been generated -->
        <div class="share-row" id="share-row" style="display: none">
          <button class="share-btn" onclick="copyTimeline()">Copy to Clipboard</button>
          <button class="share-btn" onclick="shareTimeline()">Share</button>
        </div>
      </section>
    </main>
    <script src="js/app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/RM-Tools/sw.js")
            .then(() => console.log("Service worker registered"))
            .catch((err) => console.log("Service worker error:", err));
        });
      }
    </script>
  </body>
</html>
