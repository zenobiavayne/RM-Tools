<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RM Tools</title>
    <style>
    :root {
        --bg: #1e1e2e;
        --surface: #2a2a3e;
        --accent: #f59e0b;
        --accent-hover: #d97706;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --flag: #fb923c;
        --border: #3a3a5c;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: var(--bg);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 16px;
        line-height: 1.5;
    }

    header {
        background-color: var(--surface);
        border-bottom: 2px solid var(--accent);
        padding: 16px 20px;
    }

    header h1 {
        color: var(--accent);
        font-size: 1.5rem;
        letter-spacing: 0.05em;
    }

    main {
        padding: 20px;
        max-width: 600px;
        margin: 0 auto;
    }

    h2 {
        color: var(--text-primary);
        font-size: 1.1rem;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
    }
</style>
</head>
<body>

    <header>
        <h1>RM Tools</h1>
    </header>

    <main>
        <h2>Due Date Calculator</h2>
    </main>

</body>
</html>
